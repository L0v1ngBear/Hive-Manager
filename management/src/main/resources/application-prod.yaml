auth:
  token:
    secret: ${AUTH_TOKEN_SECRET}
  login:
    max-fail-count: ${AUTH_LOGIN_MAX_FAIL_COUNT:5}
    max-ip-fail-count: ${AUTH_LOGIN_MAX_IP_FAIL_COUNT:20}
    lock-minutes: ${AUTH_LOGIN_LOCK_MINUTES:15}

security:
  response:
    key: ${RESPONSE_ENCRYPT_KEY}

logging:
  file:
    name: ${LOGGING_FILE_NAME:}
  logback:
    rollingpolicy:
      max-file-size: ${LOGGING_FILE_MAX_SIZE:20MB}
      max-history: ${LOGGING_FILE_MAX_HISTORY:14}
      total-size-cap: ${LOGGING_FILE_TOTAL_SIZE_CAP:512MB}
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    my.management: ${LOGGING_LEVEL_MY_MANAGEMENT:INFO}
    my.hive.common: ${LOGGING_LEVEL_MY_HIVE_COMMON:INFO}
    com.xxl.job: ${LOGGING_LEVEL_XXL_JOB:INFO}
    org.springframework: ${LOGGING_LEVEL_SPRING:WARN}
    com.baomidou.mybatisplus: ${LOGGING_LEVEL_MYBATIS_PLUS:WARN}
    org.mybatis: ${LOGGING_LEVEL_MYBATIS:WARN}
    java.sql: ${LOGGING_LEVEL_SQL:WARN}

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hive_mq}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: ${RABBITMQ_CONNECTION_TIMEOUT:5s}
    listener:
      simple:
        # Let the service start and reconnect if RabbitMQ is temporarily unavailable.
        missing-queues-fatal: false

hive:
  redis:
    namespace: ${HIVE_REDIS_NAMESPACE:hive}
    environment: ${HIVE_REDIS_ENV:${SPRING_PROFILES_ACTIVE:prod}}
  operation-log:
    enabled: ${OPERATION_LOG_ENABLED:true}
    collect-to-db: ${OPERATION_LOG_COLLECT_TO_DB:true}
    collect-to-slf4j: ${OPERATION_LOG_COLLECT_TO_SLF4J:true}
    async-db: true
    queue-type: ${OPERATION_LOG_QUEUE_TYPE:rabbitmq}
    rabbit-exchange: ${OPERATION_LOG_EXCHANGE:hive.operation.log.exchange}
    rabbit-routing-key: ${OPERATION_LOG_ROUTING_KEY:hive.operation.log}
    rabbit-queue: ${OPERATION_LOG_QUEUE:hive.operation.log.queue}
    cleanup-enabled: ${OPERATION_LOG_CLEANUP_ENABLED:false}
    retention-days: ${OPERATION_LOG_RETENTION_DAYS:90}
    cleanup-batch-size: ${OPERATION_LOG_CLEANUP_BATCH_SIZE:5000}
    cleanup-cron: "${OPERATION_LOG_CLEANUP_CRON:0 20 3 * * ?}"
  system-event:
    enabled: ${SYSTEM_EVENT_ENABLED:true}
    source-app: ${SYSTEM_EVENT_SOURCE_APP:hive-management}
    max-title-length: ${SYSTEM_EVENT_MAX_TITLE_LENGTH:180}
    max-content-length: ${SYSTEM_EVENT_MAX_CONTENT_LENGTH:1000}
    max-json-length: ${SYSTEM_EVENT_MAX_JSON_LENGTH:4000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  default-password:
    employee: ${EMPLOYEE_DEFAULT_PASSWORD}
    tenant-owner: ${TENANT_OWNER_DEFAULT_PASSWORD}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:https://*.your-domain.com}
