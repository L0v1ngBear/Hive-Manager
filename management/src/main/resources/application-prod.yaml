auth:
  token:
    secret: ${AUTH_TOKEN_SECRET}
  login:
    max-fail-count: ${AUTH_LOGIN_MAX_FAIL_COUNT:5}
    max-ip-fail-count: ${AUTH_LOGIN_MAX_IP_FAIL_COUNT:20}
    lock-minutes: ${AUTH_LOGIN_LOCK_MINUTES:15}

security:
  response:
    key: ${RESPONSE_ENCRYPT_KEY}

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hive_mq}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: ${RABBITMQ_CONNECTION_TIMEOUT:5s}
    listener:
      simple:
        # RabbitMQ 短暂不可用时不让业务服务启动失败，监听器会后台重连。
        missing-queues-fatal: false

hive:
  operation-log:
    enabled: ${OPERATION_LOG_ENABLED:true}
    collect-to-db: ${OPERATION_LOG_COLLECT_TO_DB:true}
    collect-to-slf4j: ${OPERATION_LOG_COLLECT_TO_SLF4J:true}
    async-db: true
    queue-type: ${OPERATION_LOG_QUEUE_TYPE:rabbitmq}
    rabbit-exchange: ${OPERATION_LOG_EXCHANGE:hive.operation.log.exchange}
    rabbit-routing-key: ${OPERATION_LOG_ROUTING_KEY:hive.operation.log}
    rabbit-queue: ${OPERATION_LOG_QUEUE:hive.operation.log.queue}
    cleanup-enabled: ${OPERATION_LOG_CLEANUP_ENABLED:true}
    retention-days: ${OPERATION_LOG_RETENTION_DAYS:90}
    cleanup-batch-size: ${OPERATION_LOG_CLEANUP_BATCH_SIZE:5000}
    cleanup-cron: "${OPERATION_LOG_CLEANUP_CRON:0 20 3 * * ?}"
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  default-password:
    employee: ${EMPLOYEE_DEFAULT_PASSWORD}
    tenant-owner: ${TENANT_OWNER_DEFAULT_PASSWORD}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:https://*.your-domain.com}
