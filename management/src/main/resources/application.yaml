server:
  port: 8081
  servlet:
    context-path: /web

spring:
  profiles:
    active: dev

tenant:
  isolation:
    # Reserved for future one-tenant-one-database routing. Keep FIELD for now.
    mode: FIELD
    default-datasource-key: default
    registry-table: tenant_database_config
    # Future database registry is stored in a shared table instead of yaml rows.
    # Management login currently has no tenantCode in the request, so before
    # enabling DATABASE mode you need a shared lookup path such as:
    # phone/openId/user identity -> tenantCode -> datasourceKey.

mybatis-plus:
  configuration: {}

auth:
  token:
    secret: hive-manager-2026-token-secret
    expire-hours: 24

security:
  response:
    key: sygav9Iec4kZiRvivnwSVe3iWq66cTCleo8gr3qL2GyXTcQHXJ1E57ZqfhqfIyWp70Imy0rJ7ZkS5SI4T0asRQ==

platform:
  developer-logins: platform_admin

ai:
  llm:
    # 默认关闭：未配置模型时仍使用本地规则分析，保证总览大盘稳定可用。
    enabled: ${AI_LLM_ENABLED:false}
    # OpenAI-Compatible Chat Completions 地址，例如 https://api.openai.com/v1/chat/completions。
    endpoint: ${AI_LLM_ENDPOINT:}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:}
    max-advices: ${AI_LLM_MAX_ADVICES:3}
    timeout-seconds: ${AI_LLM_TIMEOUT_SECONDS:30}
    temperature: ${AI_LLM_TEMPERATURE:0.2}
