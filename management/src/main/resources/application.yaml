server:
  port: 8080
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:./.env[.properties]
  profiles:
    active: dev

tenant:
  isolation:
    # Reserved for future one-tenant-one-database routing. Keep FIELD for now.
    mode: FIELD
    default-datasource-key: default
    registry-table: tenant_database_config
    # Future database registry is stored in a shared table instead of yaml rows.
    # Management login currently has no tenantCode in the request, so before
    # enabling DATABASE mode you need a shared lookup path such as:
    # phone/openId/user identity -> tenantCode -> datasourceKey.

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET:hive-backend-dev-token-secret}
    expire-hours: ${AUTH_TOKEN_EXPIRE_HOURS:24}
    renew-enabled: ${AUTH_TOKEN_RENEW_ENABLED:true}
    renew-before-minutes: ${AUTH_TOKEN_RENEW_BEFORE_MINUTES:120}

security:
  response:
    key: ${RESPONSE_ENCRYPT_KEY:sygav9Iec4kZiRvivnwSVe3iWq66cTCleo8gr3qL2GyXTcQHXJ1E57ZqfhqfIyWp70Imy0rJ7ZkS5SI4T0asRQ==}
  privacy:
    # 手机号等隐私字段的一致性哈希密钥；生产环境必须通过环境变量提供并妥善保管。
    hash-secret: ${PRIVACY_HASH_SECRET:${AUTH_TOKEN_SECRET:hive-manager-dev-privacy-secret}}

platform:
  developer-logins: platform_admin

external-api:
  guard:
    sms:
      max-calls-per-phone-window: ${EXTERNAL_API_SMS_MAX_CALLS_PER_PHONE_WINDOW:5}
      window-seconds: ${EXTERNAL_API_SMS_WINDOW_SECONDS:3600}
    oss:
      max-uploads-per-tenant-window: ${EXTERNAL_API_OSS_MAX_UPLOADS_PER_TENANT_WINDOW:120}
      upload-window-seconds: ${EXTERNAL_API_OSS_UPLOAD_WINDOW_SECONDS:3600}

logistics:
  kuaidi100:
    enabled: ${KUAIDI100_ENABLED:false}
    key: ${KUAIDI100_KEY:}
    customer: ${KUAIDI100_CUSTOMER:}
    connect-timeout: ${KUAIDI100_CONNECT_TIMEOUT:5s}
    request-timeout: ${KUAIDI100_REQUEST_TIMEOUT:10s}

storage:
  oss:
    enabled: ${ALIYUN_OSS_ENABLED:false}
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket-name: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
    path-prefix: ${ALIYUN_OSS_PATH_PREFIX:hive}
    max-file-size-mb: ${ALIYUN_OSS_MAX_FILE_SIZE_MB:20}
    allowed-extensions: ${ALIYUN_OSS_ALLOWED_EXTENSIONS:jpg,jpeg,png,pdf,doc,docx,xls,xlsx}
    allowed-content-types: ${ALIYUN_OSS_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}

notification:
  sms:
    enabled: ${NOTIFICATION_SMS_ENABLED:false}
    provider: ${NOTIFICATION_SMS_PROVIDER:noop}
    access-key: ${NOTIFICATION_SMS_ACCESS_KEY:}
    access-secret: ${NOTIFICATION_SMS_ACCESS_SECRET:}
    endpoint: ${NOTIFICATION_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
    sign-name: ${NOTIFICATION_SMS_SIGN_NAME:}
    template-code: ${NOTIFICATION_SMS_TEMPLATE_CODE:}

wechat:
  mini-program:
    enabled: ${WECHAT_MINI_PROGRAM_ENABLED:false}
    app-id: ${WECHAT_MINI_PROGRAM_APP_ID:}
    app-secret: ${WECHAT_MINI_PROGRAM_APP_SECRET:}
    subscribe:
      enabled: ${WECHAT_SUBSCRIBE_ENABLED:false}
      todo-template-id: ${WECHAT_SUBSCRIBE_TODO_TEMPLATE_ID:}
      todo-title-key: ${WECHAT_SUBSCRIBE_TODO_TITLE_KEY:thing1}
      todo-content-key: ${WECHAT_SUBSCRIBE_TODO_CONTENT_KEY:thing2}
      todo-time-key: ${WECHAT_SUBSCRIBE_TODO_TIME_KEY:time3}

xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:true}
    admin-addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8088/xxl-job-admin}
    access-token: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      app-name: ${XXL_JOB_EXECUTOR_APP_NAME:hive-backend}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      log-path: ${XXL_JOB_EXECUTOR_LOG_PATH:logs/xxl-job}
      log-retention-days: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:30}

maintenance:
  database:
    enabled: ${DB_MAINTENANCE_ENABLED:true}
    cleanup-enabled: ${DB_MAINTENANCE_CLEANUP_ENABLED:true}
    batch-size: ${DB_CLEANUP_BATCH_SIZE:5000}
    capacity-warn-mb: ${DB_CAPACITY_WARN_MB:32768}
    capacity-disk-total-mb: ${DB_CAPACITY_DISK_TOTAL_MB:40960}
    capacity-disk-path: ${DB_CAPACITY_DISK_PATH:/app}
    capacity-platform-reserve-mb: ${DB_CAPACITY_PLATFORM_RESERVE_MB:12288}
    capacity-projection-warn-percent: ${DB_CAPACITY_PROJECTION_WARN_PERCENT:70}
    capacity-projection-fail-percent: ${DB_CAPACITY_PROJECTION_FAIL_PERCENT:85}
    capacity-estimate-tenants: ${DB_CAPACITY_ESTIMATE_TENANTS:2}
    capacity-estimate-daily-orders: ${DB_CAPACITY_ESTIMATE_DAILY_ORDERS:300}
    capacity-estimate-order-items-per-order: ${DB_CAPACITY_ESTIMATE_ORDER_ITEMS_PER_ORDER:4}
    capacity-estimate-daily-cloth-in: ${DB_CAPACITY_ESTIMATE_DAILY_CLOTH_IN:800}
    capacity-estimate-daily-cloth-out: ${DB_CAPACITY_ESTIMATE_DAILY_CLOTH_OUT:600}
    capacity-estimate-active-employees: ${DB_CAPACITY_ESTIMATE_ACTIVE_EMPLOYEES:150}
    capacity-estimate-daily-operation-logs: ${DB_CAPACITY_ESTIMATE_DAILY_OPERATION_LOGS:8000}
    capacity-estimate-daily-notifications: ${DB_CAPACITY_ESTIMATE_DAILY_NOTIFICATIONS:2000}
    capacity-estimate-daily-print-tasks: ${DB_CAPACITY_ESTIMATE_DAILY_PRINT_TASKS:800}
    capacity-estimate-daily-attachments: ${DB_CAPACITY_ESTIMATE_DAILY_ATTACHMENTS:40}
    capacity-estimate-avg-attachment-mb: ${DB_CAPACITY_ESTIMATE_AVG_ATTACHMENT_MB:1.5}
    capacity-estimate-local-attachment-ratio: ${DB_CAPACITY_ESTIMATE_LOCAL_ATTACHMENT_RATIO:1.0}
    capacity-estimate-safety-factor: ${DB_CAPACITY_ESTIMATE_SAFETY_FACTOR:1.45}
    capacity-estimate-backup-keep: ${DB_CAPACITY_ESTIMATE_BACKUP_KEEP:3}
    runtime-audit-enabled: ${RUNTIME_AUDIT_ENABLED:true}
    runtime-audit-recent-minutes: ${RUNTIME_AUDIT_RECENT_MINUTES:30}
    runtime-audit-db-latency-warn-ms: ${RUNTIME_AUDIT_DB_LATENCY_WARN_MS:500}
    runtime-audit-error-warn-count: ${RUNTIME_AUDIT_ERROR_WARN_COUNT:20}
    runtime-audit-error-fail-count: ${RUNTIME_AUDIT_ERROR_FAIL_COUNT:100}
    runtime-audit-slow-warn-count: ${RUNTIME_AUDIT_SLOW_WARN_COUNT:50}
    runtime-audit-slow-fail-count: ${RUNTIME_AUDIT_SLOW_FAIL_COUNT:200}
    runtime-audit-system-error-warn-count: ${RUNTIME_AUDIT_SYSTEM_ERROR_WARN_COUNT:10}
    runtime-audit-system-error-fail-count: ${RUNTIME_AUDIT_SYSTEM_ERROR_FAIL_COUNT:50}
    runtime-audit-notification-backlog-warn-count: ${RUNTIME_AUDIT_NOTIFICATION_BACKLOG_WARN_COUNT:200}
    runtime-audit-notification-backlog-fail-count: ${RUNTIME_AUDIT_NOTIFICATION_BACKLOG_FAIL_COUNT:1000}
    operation-log-retention-days: ${OPERATION_LOG_RETENTION_DAYS:90}
    notification-retention-days: ${NOTIFICATION_RETENTION_DAYS:180}
    print-task-retention-days: ${PRINT_TASK_RETENTION_DAYS:180}
    order-status-log-retention-days: ${ORDER_STATUS_LOG_RETENTION_DAYS:730}
    system-event-retention-days: ${SYSTEM_EVENT_RETENTION_DAYS:180}

hive:
  tenant:
    # BOUNDED = keep tenant_code isolation, but only allow the configured fixed tenants.
    # OPEN is reserved for a future multi-tenant platform and should not be used now.
    mode: ${HIVE_TENANT_MODE:BOUNDED}
    default-code: ${HIVE_DEFAULT_TENANT_CODE:${HIVE_SINGLE_TENANT_CODE:}}
    allowed-codes: ${HIVE_ALLOWED_TENANT_CODES:}
    max-count: ${HIVE_TENANT_MAX_COUNT:2}
  single-tenant:
    enabled: ${HIVE_SINGLE_TENANT_ENABLED:false}
    code: ${HIVE_SINGLE_TENANT_CODE:TENANT_001}
    name: ${HIVE_SINGLE_TENANT_NAME:当前组织}
  redis:
    namespace: ${HIVE_REDIS_NAMESPACE:hive}
    environment: ${HIVE_REDIS_ENV:${spring.profiles.active:dev}}
  system-event:
    enabled: ${SYSTEM_EVENT_ENABLED:true}
    source-app: ${SYSTEM_EVENT_SOURCE_APP:hive-backend}
    max-title-length: ${SYSTEM_EVENT_MAX_TITLE_LENGTH:180}
    max-content-length: ${SYSTEM_EVENT_MAX_CONTENT_LENGTH:1000}
    max-json-length: ${SYSTEM_EVENT_MAX_JSON_LENGTH:4000}
